name: PR Quality Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enforce Branch Naming Convention
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ ! $BRANCH_NAME =~ ^(feat|fix|docs|chore|refactor)/ ]]; then
            echo "::error title=Invalid Branch Name::Your branch is named '$BRANCH_NAME'. It MUST start with one of the following prefixes: feat/, fix/, docs/, chore/, or refactor/. Example: feat/database-setup. Please rename your branch and push again."
            exit 1
          fi

      - name: Enforce Semantic PR Title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          subjectPattern: ^(?!\s).+$
          subjectPatternError: |
            Your Pull Request title is incorrect. 
            It must follow the Conventional Commits format. 
            Example: 'feat: add user authentication' or 'fix: resolve memory leak'.

      - name: Verify Architecture Directories
        run: |
          if [ ! -d "src" ]; then
            echo "Error: 'src' directory is missing."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Formatter
        run: pip install black

      - name: Enforce Code Formatting
        run: black --check src/

      - name: Acknowledge Pipeline
        run: echo "Basic architecture verified. Add your language-specific linters and tests here."
